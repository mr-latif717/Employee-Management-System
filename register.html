<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Registration</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/logo.png" alt="Company Logo" />
        <h2>Allied Software Engineers</h2>
      </div>

      <nav>
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="register.html" class="active">Register Employee</a></li>
          <li><a href="employees.html">Employees</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </header>

    <form id="employeeForm">
      <h2>Employee Registration</h2>

      <input type="text" id="empid" placeholder="Employee ID (ASE-001)" />

      <input type="text" id="fullname" placeholder="Full Name" />

      <input type="email" id="email" placeholder="Email" />

      <input type="text" id="phone" placeholder="Phone Number" />

      <select id="department">
        <option value="">Select Department</option>
        <option>HR</option>
        <option>IT</option>
        <option>Finance</option>
        <option>Marketing</option>
        <option>Software Development</option>
      </select>

      <input type="text" id="designation" placeholder="Designation" />

      <input type="date" id="joining" />

      <input type="number" id="salary" placeholder="Salary" />

      <label><strong>Gender</strong></label
      ><br /><br />

      <input type="radio" name="gender" value="Male" /> Male

      <input type="radio" name="gender" value="Female" /> Female

      <input type="radio" name="gender" value="Other" /> Other

      <br /><br />

      <button type="submit">Register Employee</button>
    </form>

    <footer>
      <p>&copy; 2026 Allied Software Engineers</p>
    </footer>

    <script src="js/validation.js"></script>
  </body>
</html>
